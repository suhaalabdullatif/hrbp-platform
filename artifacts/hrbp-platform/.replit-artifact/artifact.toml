kind = "web"
previewPath = "/"
title = "HRBP Platform"
version = "1.0.0"
id = "artifacts/hrbp-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21476

[services.development]
run = "pnpm --filter @workspace/hrbp-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hrbp-platform", "run", "build" ]
publicDir = "artifacts/hrbp-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21476"
BASE_PATH = "/"
