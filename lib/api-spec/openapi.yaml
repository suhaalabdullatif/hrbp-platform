components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Persona:
      type: object
      required: [key, label, role]
      properties:
        key:
          type: string
        label:
          type: string
        role:
          type: string
        businessUnitName:
          type: ["string", "null"]
    LoginInput:
      type: object
      required: [persona]
      properties:
        persona:
          type: string
    AuthUser:
      type: object
      required: [id, email, displayName, role]
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
        businessUnitId:
          type: ["integer", "null"]
        businessUnitName:
          type: ["string", "null"]
    BusinessUnit:
      type: object
      required: [id, name, code, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
    Employee:
      type: object
      required:
        [
          id,
          employeeNumber,
          fullName,
          email,
          gender,
          isSaudi,
          businessUnitId,
          jobTitle,
          grade,
          employmentStatus,
          hireDate,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        employeeNumber:
          type: string
        fullName:
          type: string
        email:
          type: string
        gender:
          type: string
          enum: [M, F]
        isSaudi:
          type: boolean
        businessUnitId:
          type: integer
        businessUnitName:
          type: ["string", "null"]
        jobTitle:
          type: string
        grade:
          type: string
        employmentStatus:
          type: string
          enum: [active, on_probation, terminated]
        hireDate:
          type: string
        terminationDate:
          type: ["string", "null"]
        managerId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    EmployeeInput:
      type: object
      required:
        [
          employeeNumber,
          fullName,
          email,
          gender,
          isSaudi,
          businessUnitId,
          jobTitle,
          grade,
          employmentStatus,
          hireDate,
        ]
      properties:
        employeeNumber:
          type: string
          minLength: 1
        fullName:
          type: string
          minLength: 1
        email:
          type: string
        gender:
          type: string
          enum: [M, F]
        isSaudi:
          type: boolean
        businessUnitId:
          type: integer
        jobTitle:
          type: string
        grade:
          type: string
        employmentStatus:
          type: string
          enum: [active, on_probation, terminated]
        hireDate:
          type: string
        terminationDate:
          type: ["string", "null"]
