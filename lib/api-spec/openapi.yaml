openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Enterprise HRBP Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session
  - name: business-units
    description: Business units
  - name: employees
    description: Employee master data
  - name: requisitions
    description: Recruitment requisitions
  - name: er-cases
    description: Employee relations cases
  - name: attrition
    description: Attrition records
  - name: probation
    description: Probation tracking
  - name: dashboard
    description: Dashboards and KPIs
  - name: admin
    description: User and permission management
  - name: audit
    description: Audit log
  - name: notifications
    description: Alerts and notifications
  - name: intelligence
    description: Workforce intelligence (scores, risk, benchmarking, insights)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/personas:
    get:
      operationId: listPersonas
      tags: [auth]
      summary: List available dev login personas
      responses:
        "200":
          description: Personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Persona"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in as a dev persona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /business-units:
